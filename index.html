<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>智能记账本 Glass</title>
  <meta name="description" content="雾化玻璃风格的离线记账工具">
  <!-- PWA 配置 -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ffffff">
  <link rel="apple-touch-icon" href="icon-192.png">
  
  <style>
    /* === 全局变量 === */
    :root {
      --glass-bg: rgba(255, 255, 255, 0.65);
      --glass-border: rgba(255, 255, 255, 0.5);
      --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
      --text-main: #2d3748;
      --text-sub: #718096;
      --primary: #4facfe;
      --primary-grad: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      --income: #00b09b;
      --expense: #ff6b6b;
      --radius: 20px;
    }

    [data-theme="dark"] {
      --glass-bg: rgba(30, 41, 59, 0.7);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
      --text-main: #f7fafc;
      --text-sub: #a0aec0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; -webkit-tap-highlight-color: transparent; }

    /* === 动态渐变背景 === */
    body {
      background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      color: var(--text-main);
      min-height: 100vh;
      padding: 20px 16px;
      display: flex;
      justify-content: center;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* 容器限制 */
    .app-container {
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* === 雾化玻璃通用类 === */
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: var(--radius);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      padding: 20px;
      transition: transform 0.2s;
    }

    /* === 头部 === */
    header {
      text-align: center;
      color: white;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
      padding: 10px 0;
    }
    h1 { font-size: 1.8em; margin-bottom: 5px; font-weight: 700; }
    .month-selector {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
      margin-bottom: 15px;
      background: rgba(255,255,255,0.2);
      display: inline-flex;
      padding: 8px 20px;
      border-radius: 50px;
      backdrop-filter: blur(4px);
    }
    .month-btn {
      background: none;
      border: none;
      color: white;
      font-size: 20px;
      cursor: pointer;
      padding: 0 10px;
    }

    /* === 统计卡片 === */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
    }
    .summary-item {
      text-align: center;
      color: white;
    }
    .summary-item span {
      display: block;
      font-size: 0.9em;
      opacity: 0.9;
      margin-bottom: 4px;
    }
    .summary-item strong {
      font-size: 1.4em;
      font-weight: 700;
    }

    /* === 表单 === */
    .form-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }
    input, select {
      flex: 1;
      padding: 12px 15px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.4);
      color: var(--text-main);
      font-size: 16px;
      outline: none;
      backdrop-filter: blur(4px);
      transition: all 0.3s;
    }
    input:focus, select:focus {
      background: rgba(255,255,255,0.7);
      border-color: white;
      box-shadow: 0 0 10px rgba(255,255,255,0.3);
    }
    /* 深色模式下输入框调整 */
    [data-theme="dark"] input, [data-theme="dark"] select {
      background: rgba(0,0,0,0.2);
      border-color: rgba(255,255,255,0.1);
      color: white;
    }
    [data-theme="dark"] input:focus {
      background: rgba(0,0,0,0.4);
    }

    button {
      padding: 12px;
      border-radius: 12px;
      border: none;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      color: white;
      background: var(--primary-grad);
      box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4);
    }
    button:active { transform: scale(0.96); }
    .btn-full { width: 100%; }
    
    .btn-secondary { background: rgba(255,255,255,0.3); backdrop-filter: blur(4px); color: white; box-shadow: none; }
    .btn-danger { background: linear-gradient(135deg, #ff6b6b, #ee5253); box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4); }
    .btn-import { background: linear-gradient(135deg, #00b09b, #96c93d); box-shadow: 0 4px 15px rgba(0, 176, 155, 0.4); }

    /* === 图表 === */
    .chart-container {
      height: 220px;
      position: relative;
    }
    canvas { width: 100% !important; height: 100% !important; }

    /* === 列表 === */
    .records-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      color: var(--text-main);
      font-weight: bold;
    }
    .record {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      color: var(--text-main);
    }
    [data-theme="dark"] .record { border-bottom-color: rgba(255,255,255,0.1); }
    .record:last-child { border-bottom: none; }
    .record-info div:first-child { font-weight: 600; }
    .record-info div:last-child { font-size: 0.8em; color: var(--text-sub); margin-top: 4px; }
    .record-amount { font-weight: bold; font-size: 1.1em; }
    .income-text { color: var(--income); }
    .expense-text { color: var(--expense); }

    /* === 底部操作栏 === */
    .actions {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    .actions button {
      font-size: 13px;
      padding: 10px 5px;
      background: rgba(255,255,255,0.25);
      backdrop-filter: blur(4px);
      box-shadow: none;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .actions button:active { background: rgba(255,255,255,0.4); }

    /* === 弹窗 === */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(5px);
      z-index: 1000;
      display: none; align-items: center; justify-content: center;
    }
    .modal {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 25px;
      border-radius: 24px;
      width: 90%;
      max-width: 350px;
      border: 1px solid rgba(255,255,255,0.6);
      box-shadow: 0 20px 50px rgba(0,0,0,0.2);
      color: var(--text-main);
    }
    [data-theme="dark"] .modal {
      background: rgba(30, 41, 59, 0.9);
      border-color: rgba(255,255,255,0.1);
    }
    .modal h3 { margin-bottom: 15px; text-align: center; }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .modal-actions button { flex: 1; }

    /* 备份提示条 */
    .backup-toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      color: #d35400;
      padding: 12px 20px;
      border-radius: 50px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      display: none; align-items: center; gap: 10px;
      z-index: 999; font-weight: bold; cursor: pointer;
      border: 1px solid rgba(255,255,255,0.5);
      width: 90%; max-width: 400px;
    }
    .backup-toast button {
      background: #d35400; color: white; padding: 6px 15px;
      border-radius: 20px; font-size: 12px; box-shadow: none;
    }

    #fileInput { display: none; }
  </style>
</head>
<body>

  <div class="app-container">
    <header>
      <div class="month-selector">
        <button class="month-btn" onclick="changeMonth(-1)">‹</button>
        <h1 id="currentMonth">2026年2月</h1>
        <button class="month-btn" onclick="changeMonth(1)">›</button>
      </div>
      <div class="glass-panel summary-grid" style="margin-top: 15px; padding: 15px;">
        <div class="summary-item">
          <span>本月支出</span>
          <strong id="totalExpense">¥0.00</strong>
        </div>
        <div class="summary-item">
          <span>本月收入</span>
          <strong id="totalIncome">¥0.00</strong>
        </div>
      </div>
    </header>

    <div class="glass-panel form">
      <div class="form-row">
        <select id="type">
          <option value="expense">支出</option>
          <option value="income">收入</option>
        </select>
        <input type="number" id="amount" placeholder="金额" min="0" step="0.01" />
      </div>
      <div class="form-row">
        <select id="category"></select>
        <select id="account">
          <option>现金</option><option>微信</option><option>支付宝</option><option>银行卡</option><option>信用卡</option>
        </select>
      </div>
      <input type="text" id="note" placeholder="备注（可选）" style="margin-bottom:12px;" />
      <button class="btn-full" onclick="addRecord()">➕ 记一笔</button>
    </div>

    <div class="glass-panel stats-panel" id="statsPanel" style="padding: 15px; font-size: 0.9em;">
      <!-- 动态生成统计 -->
    </div>

    <div class="glass-panel chart-container">
      <canvas id="trendChart"></canvas>
    </div>

    <div class="glass-panel records">
      <div class="records-header">
        <h3>本月记录</h3>
        <input type="text" id="searchInput" placeholder="搜索..." oninput="filterRecords()" style="width: 120px; padding: 6px 10px; font-size: 14px;" />
      </div>
      <div id="recordList"></div>
    </div>

    <div class="actions">
      <button onclick="setBudget()">🎯 预算</button>
      <button class="btn-import" onclick="triggerImport()">📥 导入</button>
      <button onclick="exportData()">📤 导出</button>
      <button class="btn-danger" onclick="clearAll()">🗑️ 清空</button>
    </div>
  </div>

  <!-- 隐藏文件输入 -->
  <input type="file" id="fileInput" accept=".csv" onchange="handleFileSelect(event)" />

  <!-- 备份提示 -->
  <div id="backupToast" class="backup-toast" onclick="exportData()">
    <span>⚠️ 超过 7 天未备份</span>
    <button>备份</button>
  </div>

  <!-- 编辑弹窗 -->
  <div id="editModal" class="modal-overlay">
    <div class="modal">
      <h3>✏️ 修改记录</h3>
      <input type="hidden" id="editId">
      <div class="form-row">
        <select id="editType"><option value="expense">支出</option><option value="income">收入</option></select>
        <input type="number" id="editAmount" placeholder="金额" />
      </div>
      <select id="editCategory" style="width:100%; margin-bottom:12px;"></select>
      <select id="editAccount" style="width:100%; margin-bottom:12px;">
        <option>现金</option><option>微信</option><option>支付宝</option><option>银行卡</option><option>信用卡</option>
      </select>
      <input type="text" id="editNote" placeholder="备注" style="margin-bottom:12px;" />
      <div class="modal-actions">
        <button onclick="closeEditModal()" style="background:#cbd5e0;color:#2d3748">取消</button>
        <button onclick="saveEdit()" style="background:var(--primary-grad)">保存</button>
      </div>
    </div>
  </div>

  <script>
    // === 数据与逻辑 (保持原有功能不变) ===
    const CATEGORIES = {
      expense: ['餐饮', '交通', '购物', '娱乐', '医疗', '住房', '通讯', '其他'],
      income: ['工资', '兼职', '理财', '红包', '退款', '其他']
    };
    
    let records = JSON.parse(localStorage.getItem('records') || '[]');
    let budget = parseFloat(localStorage.getItem('budget') || '0');
    let currentMonth = new Date().getFullYear() + '-' + String(new Date().getMonth() + 1).padStart(2, '0');
    let lastBackupDate = localStorage.getItem('lastBackupDate') || '';

    function init() {
      updateCategory();
      renderAll();
      document.getElementById('type').onchange = updateCategory;
      window.addEventListener('resize', () => setTimeout(renderTrendChart, 100));
      checkBackupStatus();
      
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(console.error);
      }
    }

    function checkBackupStatus() {
      if (records.length === 0) return;
      const today = new Date().toISOString().split('T')[0];
      if (!lastBackupDate) { showBackupToast(); return; }
      const diffDays = Math.ceil((new Date(today) - new Date(lastBackupDate)) / (1000 * 60 * 60 * 24));
      if (diffDays >= 7) showBackupToast();
    }
    function showBackupToast() { document.getElementById('backupToast').style.display = 'flex'; }
    function hideBackupToast() { document.getElementById('backupToast').style.display = 'none'; }
    function updateBackupDate() {
      localStorage.setItem('lastBackupDate', new Date().toISOString().split('T')[0]);
      hideBackupToast();
      alert('✅ 备份成功！文件已下载。');
    }

    function triggerImport() { document.getElementById('fileInput').click(); }
    function handleFileSelect(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const imported = parseCSV(e.target.result);
          if(confirm(`发现 ${imported.length} 条记录。\n确定：合并到当前账本\n取消：覆盖当前账本`)) {
            const ids = new Set(records.map(r=>r.id));
            let count = 0;
            imported.forEach(r => {
              if(ids.has(r.id)) r.id = Date.now() + Math.random();
              if(!records.some(old => old.time===r.time && old.amount===r.amount && old.category===r.category)) {
                records.push(r); count++;
              }
            });
            records.sort((a,b)=>new Date(b.time)-new Date(a.time));
            save();
            alert(`✅ 导入成功！新增 ${count} 条。`);
          } else {
            if(confirm('⚠️ 确定覆盖吗？当前数据将丢失！')) {
              records = imported; save(); alert('✅ 覆盖成功！');
            }
          }
        } catch(err) { alert('❌ 文件格式错误'); }
      };
      reader.readAsText(file, 'UTF-8');
      event.target.value = '';
    }
    function parseCSV(csv) {
      const lines = csv.split('\n');
      const res = [];
      for(let i=1; i<lines.length; i++) {
        const m = lines[i].match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
        if(!m || m.length<5) continue;
        const clean = s => s?s.replace(/^"|"$/g,'').trim():'';
        res.push({
          id: Date.now()+i, type: clean(m[0])==='收入'?'income':'expense',
          category: clean(m[1]), account: clean(m[2]), note: clean(m[3]),
          amount: parseFloat(clean(m[4]))||0, time: clean(m[5])
        });
      }
      return res;
    }

    function updateCategory() {
      const type = document.getElementById('type').value;
      const sel = document.getElementById('category');
      sel.innerHTML = '';
      CATEGORIES[type].forEach(c => {
        const o = document.createElement('option'); o.textContent=c; sel.appendChild(o);
      });
    }

    function changeMonth(delta) {
      const [y, m] = currentMonth.split('-').map(Number);
      const d = new Date(y, m-1+delta, 1);
      currentMonth = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
      renderAll();
    }

    function addRecord() {
      const type = document.getElementById('type').value;
      const amount = parseFloat(document.getElementById('amount').value);
      const category = document.getElementById('category').value;
      const account = document.getElementById('account').value;
      const note = document.getElementById('note').value.trim();
      if(isNaN(amount)||amount<=0) { alert('请输入有效金额'); return; }
      
      const now = new Date();
      const time = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
      
      records.unshift({id:Date.now(), type, amount, category, account, note, time});
      save();
      if(type==='expense' && budget>0 && currentMonth===getMonthKey()) {
        if(getMonthExpense(currentMonth)>budget) alert(`⚠️ 超预算！\n预算：¥${budget}\n支出：¥${getMonthExpense(currentMonth)}`);
      }
      document.getElementById('amount').value=''; document.getElementById('note').value='';
    }

    function save() {
      localStorage.setItem('records', JSON.stringify(records));
      localStorage.setItem('budget', budget.toString());
      renderAll();
    }

    function getMonthKey() { return new Date().getFullYear()+'-'+String(new Date().getMonth()+1).padStart(2,'0'); }
    function getMonthExpense(m) { return records.filter(r=>r.type==='expense'&&r.time.startsWith(m)).reduce((s,r)=>s+r.amount,0); }
    function getMonthIncome(m) { return records.filter(r=>r.type==='income'&&r.time.startsWith(m)).reduce((s,r)=>s+r.amount,0); }

    function renderAll() {
      const [y,m] = currentMonth.split('-');
      document.getElementById('currentMonth').textContent = `${y}年${parseInt(m)}月`;
      document.getElementById('totalExpense').textContent = '¥'+getMonthExpense(currentMonth).toFixed(2);
      document.getElementById('totalIncome').textContent = '¥'+getMonthIncome(currentMonth).toFixed(2);
      
      const exp = getMonthExpense(currentMonth);
      const inc = getMonthIncome(currentMonth);
      const days = new Date(parseInt(y), parseInt(m), 0).getDate();
      document.getElementById('statsPanel').innerHTML = `
        <div style="display:flex;justify-content:space-between;margin:4px 0;"><span>净现金流</span><strong style="color:${inc-exp>=0?'var(--income)':'var(--expense)'}">¥${(inc-exp).toFixed(2)}</strong></div>
        <div style="display:flex;justify-content:space-between;margin:4px 0;"><span>日均支出</span><strong>¥${(exp/days).toFixed(2)}</strong></div>
        <div style="display:flex;justify-content:space-between;margin:4px 0;"><span>记录数</span><strong>${records.filter(r=>r.time.startsWith(currentMonth)).length}</strong></div>
      `;
      
      renderTrendChart();
      renderRecords();
    }

    function renderTrendChart() {
      const cvs = document.getElementById('trendChart');
      const ctx = cvs.getContext('2d');
      const dpr = window.devicePixelRatio||1;
      const rect = cvs.parentElement.getBoundingClientRect();
      cvs.width = rect.width*dpr; cvs.height = rect.height*dpr;
      ctx.scale(dpr,dpr);
      const w=rect.width, h=rect.height, pad=30;
      ctx.clearRect(0,0,w,h);
      
      const dates=[], data=[];
      for(let i=29;i>=0;i--){
        const d=new Date(); d.setDate(d.getDate()-i);
        const k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
        dates.push(k);
        let ex=0, net=0;
        records.forEach(r=>{
          if(r.time.startsWith(k)){
            if(r.type==='expense'){ex+=r.amount;net-=r.amount;}else{net+=r.amount;}
          }
        });
        data.push({ex, net});
      }
      if(data.every(d=>d.ex===0&&d.net===0)) return;
      
      const maxV = Math.max(...data.flatMap(d=>[d.ex, Math.abs(d.net)]), 10);
      const getX=i=>pad+(i/(dates.length-1))*(w-2*pad);
      const getY=v=>h-pad-(v/maxV)*(h-2*pad);
      
      ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(pad, h-pad); ctx.lineTo(w-pad, h-pad); ctx.stroke();
      
      // 支出线
      ctx.strokeStyle='#ff6b6b'; ctx.lineWidth=2; ctx.beginPath();
      data.forEach((d,i)=>{ const x=getX(i), y=getY(d.ex); i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); });
      ctx.stroke();
      // 净流入线
      ctx.strokeStyle='#4facfe'; ctx.beginPath();
      data.forEach((d,i)=>{ const x=getX(i), y=getY(d.net); i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); });
      ctx.stroke();
    }

    function renderRecords() {
      const list = document.getElementById('recordList');
      const kw = document.getElementById('searchInput').value.toLowerCase();
      const filtered = records.filter(r=>r.time.startsWith(currentMonth) && (r.category.includes(kw)||r.note.includes(kw)||r.account.includes(kw)));
      
      if(filtered.length===0) { list.innerHTML='<p style="text-align:center;color:var(--text-sub);padding:20px;">无记录</p>'; return; }
      
      list.innerHTML = filtered.map(r=>`
        <div class="record" onclick="openEditModal(${r.id})">
          <div class="record-info">
            <div>${r.category} <span style="font-weight:normal;font-size:0.8em;color:var(--text-sub)">${r.account}</span></div>
            <div>${r.note||''} · ${r.time.split(' ')[0]}</div>
          </div>
          <div class="record-amount ${r.type==='income'?'income-text':'expense-text'}">
            ${r.type==='income'?'+':'-'}¥${r.amount.toFixed(2)}
          </div>
        </div>
      `).join('');
    }
    function filterRecords(){renderRecords();}

    function openEditModal(id) {
      const r = records.find(x=>x.id===id); if(!r) return;
      document.getElementById('editId').value=r.id;
      document.getElementById('editType').value=r.type;
      document.getElementById('editAmount').value=r.amount;
      document.getElementById('editNote').value=r.note||'';
      document.getElementById('editAccount').value=r.account;
      const cs = document.getElementById('editCategory'); cs.innerHTML='';
      CATEGORIES[r.type].forEach(c=>{const o=document.createElement('option');o.textContent=c;if(c===r.category)o.selected=true;cs.appendChild(o);});
      document.getElementById('editModal').style.display='flex';
    }
    function closeEditModal(){document.getElementById('editModal').style.display='none';}
    function saveEdit() {
      const id=parseInt(document.getElementById('editId').value);
      const idx=records.findIndex(r=>r.id===id);
      if(idx!==-1) {
        records[idx]={...records[idx], type:document.getElementById('editType').value, amount:parseFloat(document.getElementById('editAmount').value), category:document.getElementById('editCategory').value, account:document.getElementById('editAccount').value, note:document.getElementById('editNote').value.trim()};
        save(); closeEditModal();
      }
    }

    function setBudget() {
      const v=prompt('月度预算:', budget||'');
      if(v!==null){budget=parseFloat(v)||0; save();}
    }
    function exportData() {
      if(!records.length)return alert('无数据');
      let csv='类型,分类,账户,备注,金额,时间\n';
      records.forEach(r=>csv+=`"${r.type==='income'?'收入':'支出'}","${r.category}","${r.account}","${r.note||''}",${r.amount},"${r.time}"\n`);
      const b=new Blob([csv],{type:'text/csv'}); const u=URL.createObjectURL(b);
      const a=document.createElement('a'); a.href=u; a.download='记账_'+new Date().toISOString().slice(0,10)+'.csv'; a.click();
      updateBackupDate();
    }
    function clearAll() { if(confirm('清空所有？')){records=[];save();} }

    window.onload = init;
    document.getElementById('amount').onkeypress = e=>{if(e.key==='Enter')addRecord();};
  </script>
</body>
</html>
